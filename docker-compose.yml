services:
  household-app:
    build: .
    container_name: household-app
    ports:
      - "8080:8080"   # NiceGUI web app
      - "8081:8081"   # MCP server (SSE transport)
    volumes:
      - ./data:/app/data
    environment:
      - STORAGE_SECRET=${STORAGE_SECRET:-dev-secret-change-me}
    restart: unless-stopped